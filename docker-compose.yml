services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-belezafoco}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-belezafoco}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog
    profiles: ["dev"]
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_WEB_PORT:-8025}:8025"

  api:
    build:
      context: .
      target: api
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/belezafoco}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379}
      CORS_ORIGIN: ${DOCKER_CORS_ORIGIN:-http://localhost}
      PUBLIC_URL: ${DOCKER_PUBLIC_URL:-http://localhost}
      APP_URL: ${DOCKER_APP_URL:-http://localhost}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SMTP_HOST: ${DOCKER_SMTP_HOST:-mailhog}
      SMTP_PORT: ${DOCKER_SMTP_PORT:-1025}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    expose:
      - "3333"
    ports:
      - "${API_PORT:-3333}:3333"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3333/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    init: true
    restart: unless-stopped

  worker:
    build:
      context: .
      target: worker
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/belezafoco}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379}
      CORS_ORIGIN: ${DOCKER_CORS_ORIGIN:-http://localhost}
      PUBLIC_URL: ${DOCKER_PUBLIC_URL:-http://localhost}
      APP_URL: ${DOCKER_APP_URL:-http://localhost}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SMTP_HOST: ${DOCKER_SMTP_HOST:-mailhog}
      SMTP_PORT: ${DOCKER_SMTP_PORT:-1025}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    init: true
    restart: unless-stopped

  web:
    build:
      context: .
      target: web
      args:
        VITE_API_URL: ${DOCKER_VITE_API_URL:-/api}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_ENVIRONMENT: ${VITE_SENTRY_ENVIRONMENT:-production}
        VITE_SENTRY_RELEASE: ${VITE_SENTRY_RELEASE:-}
        VITE_SENTRY_TRACES_SAMPLE_RATE: ${VITE_SENTRY_TRACES_SAMPLE_RATE:-0.2}
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
        SENTRY_ORG: ${SENTRY_ORG:-}
        SENTRY_PROJECT_WEB: ${SENTRY_PROJECT_WEB:-}
        SENTRY_RELEASE: ${SENTRY_RELEASE:-}
    depends_on:
      api:
        condition: service_healthy
    environment:
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:-:80}
      API_UPSTREAM: ${DOCKER_API_UPSTREAM:-api:3333}
    ports:
      - "${WEB_HTTP_PORT:-80}:80"
      - "${WEB_HTTPS_PORT:-443}:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
